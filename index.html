<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>Calculator</h1>
            <button id="theme-switcher">Toggle Theme</button>
        </div>
        <div class="main-container">
            <div class="calculator">
                <div class="display">
                    <input type="text" id="result" disabled>
                </div>
                <div class="keys">
                    <button id="clear">C</button>
                    <button id="sqrt">√</button>
                    <button id="percent">%</button>
                    <button>/</button>
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                    <button>*</button>
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                    <button>-</button>
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                    <button>+</button>
                    <button>0</button>
                    <button>.</button>
                    <button id="equal" class="span-two">=</button>
                </div>
            </div>
            <div class="history-panel">
                <div class="history-header">
                    <h3>History</h3>
                    <button id="clear-history">Clear</button>
                </div>
                <ul id="history-list">
                    <!-- Calculation history will be added here -->
                </ul>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
