<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Responsive scientific calculator with calculation history, keyboard support, and theme switching."
    />
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <script type="importmap">
      {
        "imports": {
          "mathjs": "https://cdn.jsdelivr.net/npm/mathjs@12.4.2/+esm"
        }
      }
    </script>
  </head>
  <body>
    <header class="header" role="banner">
      <h1>Scientific Calculator</h1>
      <button id="theme-switcher" type="button" aria-pressed="false">Toggle theme</button>
    </header>
    <main class="app-container" aria-labelledby="calculator-heading">
      <div class="main-container">
        <section class="calculator" aria-live="polite">
          <div class="calculator-header">
            <h2 id="calculator-heading">Calculator</h2>
          </div>
          <div class="display">
            <input
              id="result"
              type="text"
              inputmode="decimal"
              aria-live="polite"
              aria-label="Calculator display"
              readonly
            />
          </div>
          <div class="keys" role="group" aria-label="Calculator keys">
            <button id="mem-clear" type="button">MC</button>
            <button id="mem-recall" type="button">MR</button>
            <button id="mem-plus" type="button">M+</button>
            <button id="mem-minus" type="button">M-</button>

            <button id="l-paren" type="button">(</button>
            <button id="r-paren" type="button">)</button>
            <button id="exponent" type="button">^</button>
            <button id="backspace" type="button">DEL</button>

            <button id="clear" type="button" class="danger">C</button>
            <button id="sqrt" type="button">√</button>
            <button id="percent" type="button">%</button>
            <button id="divide" type="button">/</button>

            <button type="button">7</button>
            <button type="button">8</button>
            <button type="button">9</button>
            <button id="multiply" type="button">*</button>

            <button type="button">4</button>
            <button type="button">5</button>
            <button type="button">6</button>
            <button id="subtract" type="button">-</button>

            <button type="button">1</button>
            <button type="button">2</button>
            <button type="button">3</button>
            <button id="add" type="button">+</button>

            <button type="button">0</button>
            <button type="button">.</button>
            <button id="equal" class="span-two" type="button">=</button>
          </div>
        </section>
        <section class="history-panel" aria-live="polite">
          <div class="history-header">
            <h2>History</h2>
            <button id="clear-history" type="button">Clear</button>
          </div>
          <ul id="history-list" aria-label="Calculation history"></ul>
        </section>
      </div>
    </main>
    <script type="module" src="script.js"></script>
  </body>
</html>
